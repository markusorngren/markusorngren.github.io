<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script>
        (function() {
            const storedLang = localStorage.getItem('app_lang');
            const browserLang = (navigator.language || navigator.userLanguage || 'sv').split('-')[0];
            const lang = storedLang || browserLang;
            
            const titles = {
                'sv': 'Hur långt?',
                'en': 'How far?',
                'ru': 'Как далеко?',
                'am': 'ምን ያህል ይርቃል?',
                'ar': 'كم تبعد؟'
            };
            
            const selectedLang = titles[lang] ? lang : 'en';
            document.title = titles[selectedLang];
            
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = `manifest-${selectedLang}.json`;
            document.head.appendChild(link);
            
            // Fallback för gamla manifest.json om något går fel
            if (selectedLang === 'sv') link.href = 'manifest.json';
        })();
    </script>

    <meta name="description" content="Detta är ett hjälpmedel för att kunna visualisera distans på ett enkelt sätt.">
    <meta name="theme-color" content="#4CAF50">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preload" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" as="style">
    <link rel="preload" href="style.css" as="style">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate.min.js" defer></script>
    
    <script src="https://js.pusher.com/8.2.0/pusher.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js" defer></script>
</head>
<body>
<div id="version-tag">V...</div>
<button id="share-btn" onclick="shareApp(event)">🔗</button>

<div id="welcome-overlay">
    <div class="welcome-content">
        <h2 id="welcome-title"></h2>
        <p id="welcome-desc2" style="font-size: 1.1rem; color: #444; margin-bottom: 20px;"></p>
        
        <div style="display: flex; align-items: center; justify-content: flex-start; gap: 10px; margin: 0 auto 15px auto; background: #fdf6e3; padding: 12px; border-radius: 10px; border: 1px solid #e0d9c8; width: fit-content;">
            <input type="checkbox" id="dont-show-again-chk" style="width: 11px; height: 11px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0;">
            <label for="dont-show-again-chk" id="dont-show-again-lbl" style="font-size: 0.95rem; color: #555; cursor: pointer; user-select: none; text-align: left; line-height: 1.3; margin: 0; font-weight: bold;"></label>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;">
            <button class="tut-btn bg-blue" id="welcome-skip-btn" onclick="skipTutorial()"></button>
            <button class="tut-btn bg-orange" id="welcome-tut-btn" onclick="startTutorial()"></button>
        </div>
    </div>
</div>

<div id="tutorial-overlay" class="hidden">
    <div id="tutorial-blocker" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:99997; background:transparent;"></div>
    <div id="tutorial-spotlight"></div>
    <div id="tutorial-tooltip">
        <p id="tutorial-text" style="margin-top:0; font-size:1.05rem; line-height:1.5; color:#333; font-weight:bold;"></p>
        <div class="tutorial-btn-row">
            <button id="tutorial-skip" onclick="skipTutorial()" style="background: none; border: none; color: #999; text-decoration: underline; cursor: pointer; font-size: 0.9rem;">Hoppa över</button>
            <button id="tutorial-next" onclick="nextTutorialStep()" style="background: var(--primary); color: white; padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">Nästa ➔</button>
        </div>
    </div>
</div>

<div id="ios-install-prompt" class="hidden">
    <div class="ios-header"><span id="ios-title">🐭 Cheese Tracker</span></div>
    <div class="ios-instructions" id="ios-desc">Installera appen för att få fullskärm och snabb åtkomst!</div>
    <div class="ios-footer" id="ios-footer-txt">Tryck på 
        <svg width="20" height="20" viewBox="0 0 50 50" style="margin: 0 5px; vertical-align: middle;">
            <path d="M30,35v10H10V15h10v-2H8v34h24V35H30z" fill="#007AFF"/>
            <path d="M24,2v30h2V2.5l8,8l1.5-1.5L25,0L24,2z" fill="#007AFF"/>
        </svg> 
        och välj <b>"Lägg till på hemskärmen"</b>.
    </div>
    <button class="close-ios-btn" id="ios-close" onclick="this.parentElement.classList.add('hidden')">Kanske senare</button>
</div>

<div id="map-page">
    <div id="map"></div>
    <div class="panel">
        <div id="dist-info"></div>
        <div class="save-btn-container">
            <button id="btn-0" class="slot-btn" onclick="handleSlotClick(0)"><div class="btn-text-container"><span class="scrolling-text"></span></div></button>
            <button id="btn-1" class="slot-btn" onclick="handleSlotClick(1)"><div class="btn-text-container"><span class="scrolling-text"></span></div></button>
            <button id="btn-2" class="slot-btn" onclick="handleSlotClick(2)"><div class="btn-text-container"><span class="scrolling-text"></span></div></button>
            <button id="btn-3" class="slot-btn" onclick="handleSlotClick(3)"><div class="btn-text-container"><span class="scrolling-text"></span></div></button>
            <button id="mode-btn" class="mode-btn" onclick="toggleTravelMode()">🚗</button>
        </div>
        <div id="search-container" class="hidden">
            <input type="text" id="text-search-input">
            <button id="go-btn" onclick="executeTextSearch()">➔</button>
        </div>
        <div class="action-container">
            <button id="start-btn" class="action-btn hidden" onclick="startGame()"></button>
            <button id="voice-btn" class="action-btn" onclick="startVoiceSearch()"></button>
            <button id="text-btn" class="action-btn" onclick="toggleSearchUI()"></button> 
            <button id="locate-btn" class="action-btn" onclick="toggleView()"></button>
        </div>
    </div>
</div>

<div id="game-page" class="hidden">
    <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 10px; z-index: 10000; position: relative; width: 100%;">
        <div id="game-distance-display" class="hidden" style="font-weight: bold; font-size: 0.9rem; background: rgba(255,255,255,0.9); padding: 5px 12px; border-radius: 20px; color: #333;"></div>
        <button id="toggle-game-view-btn" style="background:#2196F3; color:white; border-radius: 20px; padding: 6px 15px; font-size: 0.75rem; font-weight: bold; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.2);" onclick="toggleGameMap()"></button>
        <button id="zoom-toggle-btn" class="hidden" style="background:#4CAF50; color:white; border-radius: 20px; padding: 6px 15px; font-size: 0.75rem; font-weight: bold; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.2);" onclick="toggleGameZoom()"></button>
    </div>
    <div class="apple-grid" id="path"><div id="the-mouse">🐭</div></div>
    
    <div id="game-map-wrapper" class="hidden">
        <div id="game-map"></div>
    </div>
    
    <button id="cancel-game-btn" style="position: absolute; bottom: max(30px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background:#ff4444; color:white; border-radius: 25px; padding: 12px 30px; font-size: 1rem; font-weight: bold; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 10000;" onclick="stopGame()"></button>
</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <script src="version.js" defer></script>
    <script src="ar.js" defer></script>
    <script src="app.js" defer></script>
</body>
</html>
